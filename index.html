/* --------------------------------- WORLD MAP DECOR --------------------------------- */
function WorldMapDecor() {
  // Simplified continent dots — decorative only
  const dots = [];
  const rows = 20, cols = 42;
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      const x = c/cols, y = r/rows;
      // rough continent mask
      const inLand =
        (x>0.10 && x<0.30 && y>0.20 && y<0.55) || // Americas
        (x>0.42 && x<0.58 && y>0.15 && y<0.55) || // EU/Africa
        (x>0.62 && x<0.90 && y>0.15 && y<0.60);   // Asia/Oceania
      if (inLand && Math.random() > 0.35) {
        dots.push({ x: x*1200, y: y*500, o: 0.15 + Math.random()*0.35 });
      }
    }
  }
  return (
    <svg viewBox="0 0 1200 500" className="w-full h-full" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#d4af37" stopOpacity="0.4"/>
          <stop offset="100%" stopColor="#d4af37" stopOpacity="0"/>
        </radialGradient>
      </defs>
      {dots.map((d,i)=>(
        <circle key={i} cx={d.x} cy={d.y} r="1.6" fill="#d4af37" opacity={d.o}/>
      ))}
      {/* Trade routes */}
      <path d="M 250 220 Q 450 100 650 220" stroke="url(#glow)" strokeWidth="1.2" fill="none" opacity="0.7"/>
      <path d="M 650 220 Q 800 300 900 250" stroke="url(#glow)" strokeWidth="1.2" fill="none" opacity="0.7"/>
      <path d="M 250 220 Q 500 400 900 250" stroke="url(#glow)" strokeWidth="0.8" fill="none" opacity="0.4"/>
      {/* Hubs */}
      {[[250,220],[650,220],[900,250],[770,180],[520,260]].map(([x,y],i)=>(
        <g key={i}>
          <circle cx={x} cy={y} r="4" fill="#d4af37"/>
          <circle cx={x} cy={y} r="10" fill="none" stroke="#d4af37" strokeWidth="0.5" opacity="0.5" className="animate-pulse-slow"/>
        </g>
      ))}
    </svg>
  );
}

/* ---------------------------------- APP ---------------------------------- */
function App() {
  const [active, setActive] = useState('home');

  const goto = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setActive(id);
  };

  useEffect(() => {
    const sections = ['home','tiers','curriculum','tools','panel'];
    const handler = () => {
      const y = window.scrollY + 100;
      for (let i=sections.length-1; i>=0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.offsetTop <= y) { setActive(sections[i]); break; }
      }
    };
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  return (
    <div className="bg-ink-950 min-h-screen">
      <Nav active={active} onGoto={goto}/>
      <Hero onGoto={goto}/>
      <TiersSection/>
      <CurriculumSection/>
      <ToolsSection/>
      <PanelSection/>
      <CTA onGoto={goto}/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
