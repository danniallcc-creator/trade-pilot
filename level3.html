<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Level 03 · 高手跃迁塔 | 外贸领航者</title>
<meta name="description" content="外贸高手跃迁站：战略选品、大客户经营、品牌出海、团队搭建、财务与供应链、商业模式设计。12 周 72 课时 96 个知识点，让你做上去。" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="_shared.js"></script>
<script src="_samples.js"></script>
<style>
.nav-hot{position:relative;display:inline-flex;align-items:center;}
.hot-badge{position:absolute;top:-9px;right:-24px;padding:1px 5px 2px;font-size:9px;font-weight:800;line-height:1;letter-spacing:.6px;color:#fff;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#ff4d4f 0%,#ff7a1a 55%,#ffb020 100%);border-radius:6px;white-space:nowrap;pointer-events:none;transform-origin:center bottom;animation:hotPulse 1.4s cubic-bezier(.4,0,.2,1) infinite;box-shadow:0 2px 6px -1px rgba(255,77,79,.55);}
.hot-badge::before{content:'';position:absolute;inset:-3px;border-radius:8px;background:linear-gradient(135deg,#ff4d4f,#ffb020);filter:blur(7px);opacity:.55;z-index:-1;animation:hotGlow 1.4s ease-in-out infinite;}
.hot-badge::after{content:'';position:absolute;left:-3px;top:50%;width:0;height:0;border:3px solid transparent;border-right-color:#ff4d4f;transform:translateY(-50%);}
@keyframes hotPulse{0%,100%{transform:scale(1) rotate(-6deg);}50%{transform:scale(1.15) rotate(6deg);}}
@keyframes hotGlow{0%,100%{opacity:.4;filter:blur(5px);}50%{opacity:.85;filter:blur(10px);}}
</style>
<meta name="referrer" content="no-referrer" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="robots" content="noarchive,nosnippet,noimageindex" />
<script src="_protect.js" defer></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const TIER_ID = 'l3';
const D = window.TIER_DATA[TIER_ID];
const ACC = D.accentHex;
const ACC_SOFT = D.accentSoft;
const ACC_SOFT_STRONG = D.accentSoftStrong;

/* ---------- Icons ---------- */
const Icon = {
  compass: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
  arrow: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  arrowLeft: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
  chevron: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>,
  spark: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 2v6M12 16v6M4 12H2M22 12h-2M6 6l-1.4-1.4M19.4 19.4L18 18M6 18l-1.4 1.4M19.4 4.6L18 6"/></svg>,
  target: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  book: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
  clock: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  download: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  play: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><polygon points="6 4 20 12 6 20 6 4"/></svg>,
  chat: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  grid: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  code: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
};

/* ---------- NAV ---------- */
function Nav() {
  return (
    <header className="fixed top-0 inset-x-0 z-50 backdrop-blur-xl bg-ink-950/70 border-b border-white/5">
      <div className="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
        <a href="index.html" className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-gold-glow">
            <Icon.compass className="w-5 h-5 text-ink-950"/>
          </div>
          <div className="leading-tight">
            <div className="font-display text-lg font-bold gold-text">载堉视界 · 外贸领航者</div>
            <div className="text-[10px] tracking-[0.25em] text-cream-200/60 uppercase">TRADE PILOT</div>
          </div>
        </a>
        <nav className="hidden md:flex items-center gap-6 text-sm">
          <a href="level1.html" className={`nav-hot transition-colors ${TIER_ID==='l1'?'text-gold-300':'text-cream-200/70 hover:text-cream-50'}`}>L1 · 小白<span className="hot-badge">HOT</span></a>
          <a href="level2.html" className={`nav-hot transition-colors ${TIER_ID==='l2'?'text-gold-300':'text-cream-200/70 hover:text-cream-50'}`}>L2 · 新手<span className="hot-badge">HOT</span></a>
          <a href="level3.html" className={`nav-hot transition-colors ${TIER_ID==='l3'?'text-gold-300':'text-cream-200/70 hover:text-cream-50'}`}>L3 · 高手<span className="hot-badge">HOT</span></a>
          <span className="w-px h-4 bg-white/10"/>
          <a href="index.html#tools" className="text-cream-200/70 hover:text-cream-50 transition-colors">工具库</a>
          <a href="index.html#panel" className="text-cream-200/70 hover:text-cream-50 transition-colors">专家圆桌</a>
          <a href="knowledge-base.html" className="nav-hot text-cream-200/70 hover:text-cream-50 transition-colors">知识库<span className="hot-badge">HOT</span></a>
        </nav>
        <a href="index.html" className="inline-flex items-center gap-2 px-4 py-2 rounded-md border border-white/10 text-cream-100 text-sm hover:bg-white/5 transition-all">
          <Icon.arrowLeft className="w-4 h-4"/> 返回首页
        </a>
      </div>
    </header>
  );
}

/* ---------- BREADCRUMB ---------- */
function Breadcrumb() {
  return (
    <div className="max-w-7xl mx-auto px-6 lg:px-10 pt-24 pb-4">
      <div className="flex items-center gap-2 text-xs text-cream-200/50">
        <a href="index.html" className="hover:text-cream-100 transition-colors">首页</a>
        <span>/</span>
        <a href="index.html#tiers" className="hover:text-cream-100 transition-colors">三层能力</a>
        <span>/</span>
        <span className="text-gold-300">{D.tier} · {D.title}</span>
      </div>
    </div>
  );
}

/* ---------- HERO ---------- */
function Hero() {
  return (
    <section className="relative overflow-hidden bg-gradient-hero pb-24 pt-8">
      <div className="absolute inset-0 grid-lines opacity-30"/>
      <div className="absolute inset-0" style={{background: `radial-gradient(ellipse at 20% 30%, ${ACC_SOFT_STRONG} 0%, transparent 55%)`}}/>
      <div className="absolute inset-0 bg-gradient-radial-gold opacity-40"/>

      <div className="relative max-w-7xl mx-auto px-6 lg:px-10 pt-8">
        <div className="grid lg:grid-cols-12 gap-12 items-start">
          <div className="lg:col-span-8">
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border mb-8 animate-fade-in"
                 style={{background: ACC_SOFT, borderColor: `${ACC}55`}}>
              <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{background: ACC}}/>
              <span className="text-xs tracking-widest uppercase" style={{color: ACC}}>{D.tier} · Mastery Track</span>
            </div>

            <div className="flex items-baseline gap-4 mb-6 animate-fade-up">
              <span className="font-display text-7xl md:text-8xl font-bold" style={{color: ACC}}>03</span>
              <div className="font-display text-4xl md:text-5xl gold-text font-bold">{D.title}</div>
            </div>

            <h1 className="font-display text-4xl md:text-6xl font-bold text-cream-50 leading-[1.1] animate-fade-up" style={{animationDelay:'.1s'}}>
              从执行者到经营者<br/>
              把外贸真正 <span className="gold-text">"{D.subtitle}"</span>
            </h1>

            <p className="mt-8 text-lg text-cream-200/75 leading-relaxed max-w-2xl animate-fade-up" style={{animationDelay:'.2s'}}>
              {D.description}
            </p>

            <div className="mt-10 flex flex-wrap gap-4 animate-fade-up" style={{animationDelay:'.3s'}}>
              <a href="#modules" className="group inline-flex items-center gap-3 px-7 py-4 rounded-md font-bold transition-all shadow-gold-glow"
                 style={{background: ACC, color: '#050a14'}}>
                查看 7 大模块 <Icon.arrow className="w-5 h-5 group-hover:translate-x-1 transition-transform"/>
              </a>
              <a href="#curriculum" className="inline-flex items-center gap-3 px-7 py-4 rounded-md border border-cream-200/20 text-cream-100 hover:bg-cream-100/5 transition-all">
                <Icon.book className="w-5 h-5"/> 12 周训练营大纲
              </a>
            </div>

            <div className="mt-14 grid grid-cols-2 md:grid-cols-4 gap-6 animate-fade-up" style={{animationDelay:'.4s'}}>
              <StatBig label="适用阶段" value={D.tag} isText/>
              <StatBig label="核心模块" value={D.stat.modules} suffix="个"/>
              <StatBig label="总课时" value={D.stat.hours} suffix="课时"/>
              <StatBig label="实操知识点" value={D.stat.lessons} suffix="个"/>
            </div>
          </div>

          {/* Right column: outcome card */}
          <div className="lg:col-span-4 animate-fade-up" style={{animationDelay:'.25s'}}>
            <div className="sticky top-24 rounded-2xl border p-8 backdrop-blur-sm shadow-ink-elevate card-glow"
                 style={{background: 'rgba(15, 30, 58, 0.6)', borderColor: `${ACC}44`}}>
              <div className="flex items-center gap-2 mb-4">
                <Icon.target className="w-5 h-5" style={{color: ACC}}/>
                <span className="text-[10px] tracking-[0.3em] uppercase text-cream-200/60">Graduation Outcome</span>
              </div>
              <div className="font-display text-2xl text-cream-50 leading-snug mb-6">
                毕业标准
              </div>
              <p className="text-cream-100/85 leading-relaxed">{D.outcome}</p>

              <div className="mt-8 pt-6 border-t border-white/10">
                <div className="text-[10px] tracking-[0.3em] uppercase text-cream-200/60 mb-3">你会掌握</div>
                <ul className="space-y-2">
                  {['战略选品 & 蓝海洞察','KA 大客户体系经营','品牌出海 & 内容资产','团队与商业模式设计'].map((s,i)=>(
                    <li key={i} className="flex items-start gap-2 text-sm text-cream-200/80">
                      <Icon.check className="w-4 h-4 mt-0.5 flex-shrink-0" style={{color: ACC}}/>
                      <span>{s}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function StatBig({ label, value, suffix, isText }) {
  return (
    <div className="border-l pl-4" style={{borderColor: `${ACC}55`}}>
      <div className={`font-display font-bold stat-num ${isText?'text-base text-cream-100':'text-3xl md:text-4xl'}`}
           style={isText?{}:{color: ACC}}>
        {value}{suffix && <span className="text-sm text-cream-200/50 ml-1">{suffix}</span>}
      </div>
      <div className="text-xs tracking-widest uppercase text-cream-200/50 mt-1">{label}</div>
    </div>
  );
}

/* ---------- SECTION HEADER ---------- */
function SectionHeader({ eyebrow, title, desc }) {
  return (
    <div className="max-w-3xl">
      <div className="inline-flex items-center gap-2 mb-4">
        <div className="w-8 h-px" style={{background: ACC}}/>
        <span className="text-xs tracking-[0.3em] uppercase" style={{color: ACC}}>{eyebrow}</span>
      </div>
      <h2 className="font-display text-3xl md:text-5xl font-bold text-cream-50 leading-tight">{title}</h2>
      {desc && <p className="mt-5 text-base md:text-lg text-cream-200/70 leading-relaxed">{desc}</p>}
    </div>
  );
}

/* ---------- MODULES ---------- */
function ModulesSection() {
  const [open, setOpen] = useState(0);
  return (
    <section id="modules" className="relative py-28 bg-ink-950">
      <div className="max-w-7xl mx-auto px-6 lg:px-10">
        <SectionHeader
          eyebrow="Seven Core Modules · Methodology & Steps"
          title="7 大核心模块 × 方法论 × 提升步骤"
          desc="从战略选品到商业模式设计 —— 每个模块搭配可复用的经营方法论与从业务员到经营者的跃迁步骤。"
        />
        <div className="mt-14 space-y-4">
          {D.modules.map((m, i) => {
            const isOpen = open === i;
            return (
              <div key={i} className="rounded-2xl border transition-all overflow-hidden"
                   style={isOpen ? {borderColor: `${ACC}66`, background: ACC_SOFT} : {borderColor: 'rgba(255,255,255,0.08)', background: 'rgba(255,255,255,0.02)'}}>
                <div onClick={()=>setOpen(isOpen?-1:i)} role="button" tabIndex={0}
                     onKeyDown={(e)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();setOpen(isOpen?-1:i);} }}
                     className="w-full text-left p-6 md:p-8 cursor-pointer select-none hover:bg-white/[0.02] transition-colors">
                  <div className="flex items-start gap-5">
                    <div className="w-12 h-12 rounded-xl flex items-center justify-center font-display font-bold text-lg flex-shrink-0"
                         style={{background: isOpen?ACC:'rgba(255,255,255,0.05)', color: isOpen?'#050a14':ACC}}>
                      {String(i+1).padStart(2,'0')}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-start justify-between gap-4">
                        <div>
                          <div className="font-display text-xl md:text-2xl font-semibold text-cream-50">{m.name}</div>
                          <div className="text-sm text-cream-200/60 mt-1">{m.desc}</div>
                        </div>
                        <div className="flex items-center gap-3 flex-shrink-0">
                          <span className="text-xs text-cream-200/50 hidden md:inline tabular-nums">{m.points.length}·{(m.methodology||[]).length}·{(m.steps||[]).length}</span>
                          <Icon.chevron className={`w-5 h-5 transition-transform ${isOpen?'rotate-180':''}`} style={{color: isOpen?ACC:'rgba(255,255,255,0.4)'}}/>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                {isOpen && (
                  <div className="px-6 md:px-8 pb-6 md:pb-8 pl-[4.5rem] md:pl-[5rem] border-t space-y-6 animate-fade-up cursor-text select-text"
                       style={{borderColor: `${ACC}33`, paddingTop: '1.5rem'}}
                       onClick={(e)=>e.stopPropagation()}>
                    {(true) && (
                        <div className="mt-6 pt-6 border-t space-y-6 animate-fade-up" style={{borderColor: `${ACC}33`}}>
                          <div>
                            <div className="flex items-center gap-2 mb-3">
                              <span className="text-[10px] tracking-[0.3em] uppercase" style={{color: ACC}}>Knowledge · 知识点</span>
                              <span className="text-xs text-cream-200/40">{m.points.length} 项</span>
                            </div>
                            <div className="grid md:grid-cols-2 gap-3">
                              {m.points.map((p, k) => (
                                <div key={k} className="flex items-start gap-3 p-3 rounded-lg bg-ink-950/40 border border-white/5">
                                  <Icon.check className="w-4 h-4 mt-1 flex-shrink-0" style={{color: ACC}}/>
                                  <span className="text-sm text-cream-100/90 leading-relaxed">{p}</span>
                                </div>
                              ))}
                            </div>
                          </div>

                          {m.methodology && m.methodology.length > 0 && (
                            <div>
                              <div className="flex items-center gap-2 mb-3">
                                <span className="text-[10px] tracking-[0.3em] uppercase" style={{color: ACC}}>Methodology · 经营方法论</span>
                                <span className="text-xs text-cream-200/40">{m.methodology.length} 法</span>
                              </div>
                              <div className="grid md:grid-cols-2 gap-3">
                                {m.methodology.map((mm, k) => (
                                  <div key={k} className="flex items-start gap-3 p-3 rounded-lg border" style={{background: `${ACC}0f`, borderColor: `${ACC}33`}}>
                                    <span className="font-display font-bold text-xs mt-0.5 flex-shrink-0" style={{color: ACC}}>M{k+1}</span>
                                    <span className="text-sm text-cream-100/90 leading-relaxed">{mm}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {m.steps && m.steps.length > 0 && (
                            <div>
                              <div className="flex items-center gap-2 mb-3">
                                <span className="text-[10px] tracking-[0.3em] uppercase" style={{color: ACC}}>Progression · 跃迁步骤</span>
                                <span className="text-xs text-cream-200/40">{m.steps.length} 步</span>
                              </div>
                              <div className="relative pl-4">
                                <div className="absolute left-[7px] top-2 bottom-2 w-px" style={{background: `${ACC}55`}}/>
                                <ol className="space-y-2.5">
                                  {m.steps.map((s, k) => (
                                    <li key={k} className="relative flex items-start gap-3 p-3 rounded-lg bg-ink-950/50 border border-white/5">
                                      <span className="absolute -left-4 top-3 w-3 h-3 rounded-full ring-2 ring-ink-950" style={{background: ACC}}/>
                                      <span className="font-display text-xs font-bold flex-shrink-0 mt-0.5" style={{color: ACC}}>Step {k+1}</span>
                                      <span className="text-sm text-cream-100/90 leading-relaxed flex-1">{s}</span>
                                    </li>
                                  ))}
                                </ol>
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}


/* ---------- SAMPLE CASE (virtual end-to-end deliverable per week) ---------- */
function SampleArtifact({a}) {
  if (a.type === 'email') {
    return (
      <div className="rounded-lg border overflow-hidden bg-ink-950/60" style={{borderColor: `${ACC}33`}}>
        <div className="px-4 py-2.5 border-b flex items-center gap-2 text-[11px]" style={{borderColor: `${ACC}22`, background: `${ACC}0a`}}>
          <span className="inline-flex w-2 h-2 rounded-full" style={{background: '#ff5f57'}}/>
          <span className="inline-flex w-2 h-2 rounded-full" style={{background: '#febc2e'}}/>
          <span className="inline-flex w-2 h-2 rounded-full" style={{background: '#28c840'}}/>
          <span className="ml-2 text-cream-200/50 tracking-wider uppercase">Email · {a.label}</span>
        </div>
        <div className="px-4 py-3 text-[12px] leading-relaxed text-cream-100/85 border-b space-y-1" style={{borderColor: `${ACC}18`}}>
          {a.from && <div><span className="text-cream-200/40 w-14 inline-block">From</span><span className="text-cream-50">{a.from}</span></div>}
          {a.to && <div><span className="text-cream-200/40 w-14 inline-block">To</span><span className="text-cream-50">{a.to}</span></div>}
          {a.cc && <div><span className="text-cream-200/40 w-14 inline-block">Cc</span><span className="text-cream-50">{a.cc}</span></div>}
          {a.subject && <div><span className="text-cream-200/40 w-14 inline-block">Subject</span><span className="text-cream-50 font-medium">{a.subject}</span></div>}
        </div>
        <pre className="px-4 py-4 text-[12.5px] leading-[1.75] text-cream-100/90 whitespace-pre-wrap font-sans">{a.content}</pre>
      </div>
    );
  }
  if (a.type === 'document') {
    return (
